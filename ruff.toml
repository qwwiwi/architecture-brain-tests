# Ruff configuration for architecture-brain-tests
# https://github.com/astral-sh/ruff

line-length = 100
target-version = "py312"

[lint]
select = [
    "E",     # pycodestyle errors
    "F",     # pyflakes
    "W",     # pycodestyle warnings
    "I",     # isort
    "S",     # flake8-bandit (security)
    "UP",    # pyupgrade
    "B",     # flake8-bugbear
    "SIM",   # flake8-simplify
    "RUF",   # ruff-specific
    "C4",    # flake8-comprehensions
    "T20",   # flake8-print
    "ASYNC", # flake8-async
    "PT",    # flake8-pytest-style
]

ignore = [
    "S101",   # assert in tests is fine
    "S603",   # subprocess without shell=True in tests
    "S607",   # partial path in subprocess
    "RUF001", # Cyrillic chars in strings (Russian text is expected)
]

[lint.per-file-ignores]
"tests/*" = ["T20", "S106", "S105", "S110"]

[format]
quote-style = "double"
indent-style = "space"
